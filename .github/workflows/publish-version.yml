name: Publish Version

on:
  release:
    types: [published]

permissions:
  pages: write
  id-token: write

jobs:
  publish-version:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Create version JSON
        run: |
          mkdir -p _site
          printf '{"tag_name":"%s"}\n' "${{ github.event.release.tag_name }}" > _site/version.json
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
